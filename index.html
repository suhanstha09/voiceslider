<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Volume Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <div class="title-block">
         <h1>VOICE MONITOR</h1>
         <p>REAL-TIME MIC INPUT → VOLUME CONTROL</p>
             </div>
        </div>

        <div class="status">
      <div class="status-dot" id="statusDot"></div>
     </div>

      <div class="vol-display">
      <div class="vol-number" id="volNumber">00</div>
      <div class="vol-unit">SIGNAL LEVEL</div>
      </div>
     <div class="slider-wrap">
        <div class="slider-labels">
            <span>SILENT</span>
            <span>LOW</span>
            <span>MID</span>
            <span>HIGH</span>
            <span>MAX</span>
        </div>

         <div class="track">
        <div class="fill" id="fill"></div>
      </div>
      <div class="ticks" id="ticks"></div>
      
     </div>

     <div class="waveform" id="waveform"></div>

     <div class="info-row">
      <div class="info-item">PEAK &nbsp;<span id="peakVal">00</span></div>
      <div class="info-item">AVG &nbsp;<span id="avgVal">00</span></div>
      <div class="info-item">UPDATES/S &nbsp;<span id="rateVal">--</span></div>
     </div>

      <div id="error-msg">
      ⚠ CANNOT CONNECT TO SERVER<br>
      Make sure <strong>voiceslider.py</strong> is running:<br>
      <code>python voiceslider.py</code>
    </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
