<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Volume Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <div class="title-block">
         <h1>VOICE MONITOR</h1>
         <p>REAL-TIME MIC INPUT → VOLUME CONTROL</p>
             </div>
        </div>

        <div class="status">
      <div class="status-dot" id="statusDot"></div>
     </div>

      <div class="vol-display">
      <div class="vol-number" id="volNumber">00</div>
      <div class="vol-unit">SIGNAL LEVEL</div>
      </div>
     <div class="slider-wrap">
        <div class="slider-labels">
            <span>SILENT</span>
        <span>LOW</span>
        <span>MID</span>
        <span>HIGH</span>
        <span>MAX</span>
        </div>
     </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
